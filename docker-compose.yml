# AI Agent Ops Platform - Docker Compose Configuration
# Development environment with all required services

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ai-agent-ops-postgres
    environment:
      POSTGRES_DB: ai_agent_ops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_INITDB_ARGS: '--auth-host=scram-sha-256'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ai_agent_ops']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-agent-ops-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ai-agent-ops-redis
    command: redis-server --requirepass redis_password
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ai-agent-ops-network

  # Backend API Server
  api-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ai-agent-ops-api
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres_password@postgres:5432/ai_agent_ops
      REDIS_URL: redis://:redis_password@redis:6379
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      COMPOSIO_API_KEY: ${COMPOSIO_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: http://localhost:3000
    ports:
      - '5000:5000'
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ai-agent-ops-network
    restart: unless-stopped

  # Frontend React App
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-agent-ops-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_WS_URL: ws://localhost:5000
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - api-server
    networks:
      - ai-agent-ops-network
    restart: unless-stopped

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: ai-agent-ops-nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - api-server
    networks:
      - ai-agent-ops-network
    restart: unless-stopped
    profiles:
      - production

# Volumes
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# Networks
networks:
  ai-agent-ops-network:
    driver: bridge
    name: ai-agent-ops-network

# Development commands:
# docker-compose up -d          # Start all services
# docker-compose logs -f        # View logs
# docker-compose down           # Stop all services
# docker-compose down -v        # Stop and remove volumes